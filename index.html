<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پروژه شخصی من</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #0b0f19;
            color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            text-align: center;
            padding: 2.5rem;
            background-color: #111827;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            border: 1px solid #1f2937;
            max-width: 400px;
        }
        h1 { color: #38bdf8; font-size: 1.8rem; margin-bottom: 10px; }
        p { color: #9ca3af; line-height: 1.6; }
        .badge {
            display: inline-block;
            padding: 6px 16px;
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            color: white;
            border-radius: 30px;
            font-size: 0.85rem;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>سرویس ابری آمورا فعال است 🚀</h1>
        <p>محیط داکر با موفقیت کانفیگ شد و هسته لینوکسی پروژه بدون هیچ خطایی در حال اجراست.</p>
        <div class="badge">پروتکل فعال: XHTTP (H2/H3)</div>
    </div>
</body>
</html>
